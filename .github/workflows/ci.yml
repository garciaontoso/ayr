name: CI

# Bloquea merges a main si build / tests / wrangler validate fallan.
# Lint queda como warning (continue-on-error) hasta resolver legacy
# noise — ver TODO debajo.
#
# Semana 1 del roadmap profesionalización (docs/ROADMAP-PRO.md).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (build + lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      # TODO: eliminar continue-on-error cuando arreglemos lint legacy
      # (~707 errores ESLint a 2026-05-03: empty-block, unused-vars en
      # storage/userPrefs/main.jsx). Ver `npm run lint` en local.
      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Typecheck (TypeScript)
        run: npm run typecheck

      - name: Test (Vitest)
        run: npm run test

      - name: Build (Vite)
        run: npm run build
        env:
          # build no necesita el token real — sólo se inyecta en runtime
          VITE_AYR_TOKEN: dummy-build-token

  worker:
    name: Worker (wrangler validate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install deps
        run: npm ci

      # `wrangler deploy --dry-run` parsea wrangler.toml + bindings y
      # bundlea worker.js sin requerir auth Cloudflare. Si falla aquí,
      # falla el deploy real en producción → bloqueamos el merge.
      - name: Wrangler validate (dry-run bundle)
        run: npx wrangler deploy --dry-run --outdir=dist

  perf:
    name: Performance (Lighthouse + bundle size)
    runs-on: ubuntu-latest
    needs: frontend
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_AYR_TOKEN: dummy-build-token
      - name: Bundle size budget
        run: npm run size
      - name: Lighthouse CI
        run: npm run lhci
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        continue-on-error: true   # primero medimos, luego endurecemos

  # ───────────────────────────────────────────────────────────────────────
  # E2E (Playwright contra producción).
  # Semana 10 del roadmap profesionalización (docs/ROADMAP-PRO.md), adelantada
  # para servir de safety net antes del refactor de monolitos.
  #
  # 5 flujos críticos: portfolio loads, search ZTS, cost basis, audit, errors.
  # Por ahora `continue-on-error: true` mientras validamos estabilidad de
  # selectors. Una vez fiables, lo quitamos para bloquear merges si rompen.
  # ───────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E (Playwright vs production)
    runs-on: ubuntu-latest
    needs: frontend
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E
        run: npm run e2e
        env:
          E2E_URL: https://ayr.onto-so.com
          E2E_TOKEN: ${{ secrets.AYR_WORKER_TOKEN }}
        continue-on-error: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
