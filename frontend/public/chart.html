<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chart</title>
<style>html,body{margin:0;padding:0;width:100%;height:100%;background:#0d1117;overflow:hidden}#tv{width:100%;height:100%}</style>
</head><body>
<div id="tv"></div>
<script src="https://s3.tradingview.com/tv.js"></script>
<script>
const params = new URLSearchParams(location.search);
const symbol = params.get('s') || 'AAPL';
new TradingView.widget({
  container_id: 'tv',
  symbol: symbol,
  interval: 'D',
  timezone: 'America/New_York',
  theme: 'dark',
  style: '1',
  locale: 'es',
  toolbar_bg: '#0d1117',
  enable_publishing: false,
  hide_top_toolbar: false,
  hide_legend: false,
  save_image: false,
  width: '100%',
  height: '100%',
  studies: [
    { id: 'MASimple@tv-basicstudies', inputs: { length: 50 } },
    { id: 'MASimple@tv-basicstudies', inputs: { length: 1000 } }
  ],
  overrides: {
    'paneProperties.background': '#0d1117',
    'paneProperties.backgroundType': 'solid',
    'mainSeriesProperties.candleStyle.upColor': '#30d158',
    'mainSeriesProperties.candleStyle.downColor': '#ff453a',
    'mainSeriesProperties.candleStyle.borderUpColor': '#30d158',
    'mainSeriesProperties.candleStyle.borderDownColor': '#ff453a',
    'mainSeriesProperties.candleStyle.wickUpColor': '#30d158',
    'mainSeriesProperties.candleStyle.wickDownColor': '#ff453a',
  }
});
</script>
</body></html>
