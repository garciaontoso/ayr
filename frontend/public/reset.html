<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reset · A&R</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { background: #0d1117; color: #c8a44e; font-family: -apple-system, monospace;
         display: flex; flex-direction: column; align-items: center; justify-content: center;
         min-height: 100vh; margin: 0; text-align: center; padding: 20px; }
  h1 { font-size: 20px; margin: 0 0 8px; }
  p { color: #8b949e; font-size: 13px; margin: 4px 0; }
  .spin { display: inline-block; animation: s 1s linear infinite; }
  @keyframes s { 100% { transform: rotate(360deg); } }
</style>
</head>
<body>
<div>
  <div style="font-size:32px;margin-bottom:12px"><span class="spin">⏳</span></div>
  <h1>Limpiando caché…</h1>
  <p id="status">Desregistrando service workers…</p>
  <p style="font-size:11px;margin-top:20px">No cierres esta pestaña</p>
</div>
<script>
(async () => {
  const status = document.getElementById('status');
  try {
    // 1. Unregister ALL service workers
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      for (const reg of regs) {
        try { await reg.unregister(); } catch {}
      }
      status.textContent = `Desregistrados ${regs.length} SW · limpiando caches…`;
    }
    // 2. Clear ALL caches
    if ('caches' in window) {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
      status.textContent = `${status.textContent} · ${keys.length} caches borrados`;
    }
    // 3. NO borrar localStorage — contiene listas custom del usuario
    //    (Gorka, tabs watchlist, preferencias). Solo clean sessionStorage.
    try { sessionStorage.clear(); } catch {}
    // 4. Redirect to root with cache-busting param
    status.textContent = 'Listo · cargando versión nueva…';
    setTimeout(() => {
      window.location.replace('/?fresh=' + Date.now());
    }, 800);
  } catch (e) {
    status.textContent = 'Error: ' + e.message + ' (recarga manualmente)';
  }
})();
</script>
</body>
</html>
