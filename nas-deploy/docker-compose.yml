# A&R IB Stack — DS423+ adaptado a setup existente del NAS
# El cloudflare-tunnel YA existe en /volume1/docker/cloudflare-tunnel/ con
# network_mode:host, así que solo necesitamos exponer ib-bridge en localhost
# y añadir hostname ib.onto-so.com → http://localhost:8080 en el dashboard CF.

name: ib-stack

networks:
  ib-stack-net:
    driver: bridge

services:
  # IBKR Gateway — interno, no expuesto al host
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    container_name: ib-gateway
    restart: unless-stopped
    environment:
      TWS_USERID: ${TWS_USERID}
      TWS_PASSWORD: ${TWS_PASSWORD}
      TRADING_MODE: ${TRADING_MODE:-live}
      READ_ONLY_API: ${READ_ONLY_API:-yes}
      # Sin AUTO_RESTART_TIME: permitimos al gateway aguantar la sesión
      # tantos días como IBKR aguante (típicamente 2-3) sin forzar 2FA cada
      # día. El usuario rearranca manualmente vía botón en el header (que
      # llama a /control/start del bridge → docker.sock → restart).
      RELOGIN_AFTER_2FA_TIMEOUT: yes
      EXISTING_SESSION_DETECTED_ACTION: primary
      TIME_ZONE: ${TZ:-Europe/Madrid}
      BIND_ADDRESS: 0.0.0.0
    volumes:
      - /volume1/docker/ib-stack/ib-gateway/config:/home/ibgateway/Jts
      - /volume1/docker/ib-stack/ib-gateway/logs:/home/ibgateway/ibc/logs
    networks:
      - ib-stack-net
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/4003"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 900M
        reservations:
          memory: 512M

  # ib-bridge — expuesto en 127.0.0.1:8080 (CF tunnel host-mode lo alcanza)
  ib-bridge:
    build:
      context: ../ib-bridge
      dockerfile: Dockerfile
    container_name: ib-bridge
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      HOST: 0.0.0.0
      IB_HOST: ib-gateway
      IB_PORT: 4003
      BRIDGE_AUTH_TOKEN: ${BRIDGE_AUTH_TOKEN}
      IB_CONTROL_TOKEN: ${IB_CONTROL_TOKEN}
      READ_ONLY_API: ${READ_ONLY_API:-yes}
      TZ: ${TZ:-Europe/Madrid}
    ports:
      - '127.0.0.1:8090:8080'
    volumes:
      # docker.sock mounted RO would block POST /containers/.../stop,
      # so we use rw. Endpoints in src/routes/control.js hardcode an
      # allowlist of one container (ib-gateway), so even token compromise
      # cannot touch any other container on the NAS.
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      # docker.sock on Synology is owned by root:root mode 660. Adding
      # gid 0 (root group) to the `node` user lets the bridge read/write
      # the socket without running the whole process as root.
      - "0"
    networks:
      - ib-stack-net
    depends_on:
      ib-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
