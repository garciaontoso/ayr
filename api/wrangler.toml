name = "aar-api"
main = "src/worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Custom domain — avoids the workers.dev IP range (188.114.96.x)
# which is blocked/unreachable from some ISPs (Spain, China).
# Custom domains use Cloudflare's main CDN IPs (104.21.x.x / 172.67.x.x)
# which are reachable everywhere.
routes = [
  { pattern = "api.onto-so.com", custom_domain = true }
]

[[d1_databases]]
binding = "DB"
database_name = "aar-finanzas"
database_id = "d9dc97c1-1ea5-4e05-b637-89e52229d099"

[[r2_buckets]]
binding = "EARNINGS_R2"
bucket_name = "ayr-earnings-archive"

# Cron DISABLED 2026-04-08 — AI agents now triggered manually by user from
# the "Ejecutar agentes" button in the AgentesTab. Saves ~$33/month when
# user doesn't open the app. To re-enable, uncomment the block below.
#
# [triggers]
# crons = ["0 9 * * 1-5"]
