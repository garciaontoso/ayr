name = "aar-api"
main = "src/worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Custom domain — avoids the workers.dev IP range (188.114.96.x)
# which is blocked/unreachable from some ISPs (Spain, China).
# Custom domains use Cloudflare's main CDN IPs (104.21.x.x / 172.67.x.x)
# which are reachable everywhere.
routes = [
  { pattern = "api.onto-so.com", custom_domain = true }
]

[[d1_databases]]
binding = "DB"
database_name = "aar-finanzas"
database_id = "d9dc97c1-1ea5-4e05-b637-89e52229d099"

[[r2_buckets]]
binding = "EARNINGS_R2"
bucket_name = "ayr-earnings-archive"

# Cron schedule 2026-04-18:
# - Daily agents pipeline: 13:00 UTC weekdays = 15:00 Madrid (CEST summer) /
#   14:00 Madrid (CET winter). Runs ~30 min before US market open (15:30
#   Madrid summer) so the user can read insights with Asia + Europe closed
#   and make trading decisions before NYSE opens.
# - Weekly digest: Monday 06:00 UTC (before the daily run so it summarizes
#   last week). Will NOT trigger a full agents pipeline (scheduled handler
#   only runs agents on the 13:00 UTC cron; see src/worker.js).
[triggers]
crons = [
  "0 6 * * 1",     # Weekly digest (Monday 06:00 UTC)
  "0 13 * * 1-5",  # Daily AI agents pipeline (weekdays 13:00 UTC = 15:00 Madrid summer)
]
