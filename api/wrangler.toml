name = "aar-api"
main = "src/worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Custom domain — avoids the workers.dev IP range (188.114.96.x)
# which is blocked/unreachable from some ISPs (Spain, China).
# Custom domains use Cloudflare's main CDN IPs (104.21.x.x / 172.67.x.x)
# which are reachable everywhere.
routes = [
  { pattern = "api.onto-so.com", custom_domain = true }
]

[[d1_databases]]
binding = "DB"
database_name = "aar-finanzas"
database_id = "d9dc97c1-1ea5-4e05-b637-89e52229d099"

[[r2_buckets]]
binding = "EARNINGS_R2"
bucket_name = "ayr-earnings-archive"

# Crons LLM (Oracle / agentes) DESACTIVADOS desde 2026-04-19 para evitar coste IA.
# Esos siguen ON-DEMAND.
#
# Cron Flex sync ACTIVADO 2026-05-01: solo es 1 HTTP request al NAS bridge
# que pulla IB Flex y mete dividendos+trades en D1. NO usa Claude API.
# Coste: 30 invocaciones/mes × $0 (free tier 100K/día) = $0.
#
# Cron schedule: "30 7 * * 1-5"  →  07:30 UTC = 09:30 Madrid (CEST verano)
#                                   o  08:30 Madrid (CET invierno).
# Si quieres exacto 08:30 Madrid año redondo, hay que partir en 2 crons o
# aceptar el desfase de 1h en cambio de hora.
[triggers]
crons = [
  # ─── ARQUITECTURA REDUNDANTE TRADES SYNC (post 2026-05-05 incidente Flex token) ───
  # CAPA 1 (PRIMARY): bridge executions cada 30min mercado USA
  "*/30 13-21 * * 1-5",   # Bridge sync — cada 30min lun-vie 13:00-21:00 UTC (mercado USA)
  # CAPA 3 (MONITOREO): freshness check tras cierre USA
  "0 22 * * *",           # Trades freshness check diario 22:00 UTC (post-cierre USA)
  # Otros crons existentes:
  "0 12 * * *",           # News + YouTube refresh diario 12:00 UTC (~20:00 Shanghai)
  "0 8 * * *",            # Data Audit diario 08:00 UTC (~10:00 Madrid / 16:00 Shanghai)
  # 2026-05-05: ELIMINADO "30 7 * * 1-5" (IB Flex backup).
  # El bridge sync cada 30min cubre 100% trades nuevos sin token que caduque.
  # Si Flex se necesita para reconciliación histórica, trigger manual:
  #   curl -X POST https://api.onto-so.com/api/ib-flex-sync -H "X-AYR-Auth:..."
  # CF Workers limit = 5 crons. Ya tenemos 4, queda margen de 1.
]
#
# Crons antiguos preservados como referencia (DESACTIVADOS):
# - "0 6 * * 1"     Weekly digest LLM (Monday 06:00 UTC)
# - "0 13 * * 1-5"  Daily AI agents pipeline
# - "30 14 * * 1-5" Research auto-scan
