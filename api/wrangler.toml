name = "aar-api"
main = "src/worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Custom domain — avoids the workers.dev IP range (188.114.96.x)
# which is blocked/unreachable from some ISPs (Spain, China).
# Custom domains use Cloudflare's main CDN IPs (104.21.x.x / 172.67.x.x)
# which are reachable everywhere.
routes = [
  { pattern = "api.onto-so.com", custom_domain = true }
]

[[d1_databases]]
binding = "DB"
database_name = "aar-finanzas"
database_id = "d9dc97c1-1ea5-4e05-b637-89e52229d099"

[[r2_buckets]]
binding = "EARNINGS_R2"
bucket_name = "ayr-earnings-archive"

# Crons DESACTIVADOS (2026-04-19) — a petición del usuario para eliminar
# todo gasto automático en API. Las consultas Oracle / agentes ahora son
# ON-DEMAND: click de botón en la UI o petición manual (POST /api/agent-run).
# Ahorro estimado: ~$33-45/mes.
#
# Schedules preservados como referencia:
# [triggers]
# crons = [
#   "0 6 * * 1",     # Weekly digest (Monday 06:00 UTC)
#   "0 13 * * 1-5",  # Daily AI agents pipeline
#   "30 14 * * 1-5", # Research auto-scan
# ]
